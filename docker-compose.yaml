services:
  app:
    image: paliari/apache-php8-oci8:1.3.0-dev-xdebug
    volumes:
      - ./ais:/tmp/ais
      - ./docker-php-ext-xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      NLS_LANG: "AMERICAN_AMERICA.AL32UTF8"
      XDEBUG_MODE: "debug,develop"
      XDEBUG_CONFIG: "client_host=host.docker.internal start_with_request=yes"
    ports:
      - "8000:8000"
    working_dir: /tmp/ais
    command: php -S 0.0.0.0:8000
